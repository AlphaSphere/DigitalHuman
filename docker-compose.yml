services:
  web:
    build:
      context: .
      dockerfile: Frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "5173:5173"
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    env_file:
      - .env.example
    environment:
      DATABASE_URL: mysql+pymysql://digital_human:digital_human@mysql:3306/digital_human
      REDIS_URL: redis://redis:6379/0
      STORAGE_ROOT: /app/storage
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Backend/worker.Dockerfile
    env_file:
      - .env.example
    environment:
      DATABASE_URL: mysql+pymysql://digital_human:digital_human@mysql:3306/digital_human
      REDIS_URL: redis://redis:6379/0
      STORAGE_ROOT: /app/storage
    volumes:
      - ./storage:/app/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: digital_human
      MYSQL_USER: digital_human
      MYSQL_PASSWORD: digital_human
      MYSQL_ROOT_PASSWORD: digital_human_root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-udigital_human", "-pdigital_human"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  whisper:
    build:
      context: .
      dockerfile: Services/whisper-service/Dockerfile
    profiles: ["whisper", "models"]
    env_file:
      - .env.example
    environment:
      STORAGE_ROOT: /app/storage
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-}
    ports:
      - "8001:8001"
    volumes:
      - ./storage:/app/storage

  cosyvoice:
    build:
      context: .
      dockerfile: Services/cosyvoice-service/Dockerfile
    profiles: ["cosyvoice", "models"]
    env_file:
      - .env.example
    environment:
      COSYVOICE_UPSTREAM_URL: ${COSYVOICE_UPSTREAM_URL:-}
      COSYVOICE_UPSTREAM_MODE: ${COSYVOICE_UPSTREAM_MODE:-official_fastapi}
      COSYVOICE_COMMAND_TEMPLATE: ${COSYVOICE_COMMAND_TEMPLATE:-}
      COSYVOICE_MODEL_DIR: ${COSYVOICE_MODEL_DIR:-}
      COSYVOICE_SFT_SPK_ID: ${COSYVOICE_SFT_SPK_ID:-中文女}
      COSYVOICE_PROMPT_TEXT: ${COSYVOICE_PROMPT_TEXT:-}
      COSYVOICE_TARGET_SAMPLE_RATE: ${COSYVOICE_TARGET_SAMPLE_RATE:-22050}
      COSYVOICE_WORKDIR: ${COSYVOICE_WORKDIR:-}
      COSYVOICE_TIMEOUT_SECONDS: ${COSYVOICE_TIMEOUT_SECONDS:-600}
      ALLOW_STUB_OUTPUT: ${ALLOW_MODEL_SERVICE_STUB_OUTPUT:-false}
    ports:
      - "8002:8002"
    volumes:
      - ./storage:/app/storage
      - ${COSYVOICE_REPO_PATH:-./external/CosyVoice}:/opt/cosyvoice:ro

  heygem:
    build:
      context: .
      dockerfile: Services/heygem-service/Dockerfile
    profiles: ["heygem", "models"]
    env_file:
      - .env.example
    environment:
      HEYGEM_UPSTREAM_URL: ${HEYGEM_UPSTREAM_URL:-}
      HEYGEM_VIDEO_BASE_URL: ${HEYGEM_VIDEO_BASE_URL:-}
      HEYGEM_COMMAND_TEMPLATE: ${HEYGEM_COMMAND_TEMPLATE:-}
      HEYGEM_DEFAULT_VIDEO_PATH: ${HEYGEM_DEFAULT_VIDEO_PATH:-}
      HEYGEM_AVATAR_PROFILE_MAP: ${HEYGEM_AVATAR_PROFILE_MAP:-}
      HEYGEM_RESULT_DIR: ${HEYGEM_RESULT_DIR:-}
      HEYGEM_POLL_INTERVAL_SECONDS: ${HEYGEM_POLL_INTERVAL_SECONDS:-5}
      HEYGEM_POLL_TIMEOUT_SECONDS: ${HEYGEM_POLL_TIMEOUT_SECONDS:-1800}
      HEYGEM_WORKDIR: ${HEYGEM_WORKDIR:-}
      HEYGEM_TIMEOUT_SECONDS: ${HEYGEM_TIMEOUT_SECONDS:-1800}
      ALLOW_STUB_OUTPUT: ${ALLOW_MODEL_SERVICE_STUB_OUTPUT:-false}
    ports:
      - "8003:8003"
    volumes:
      - ./storage:/app/storage
      - ${HEYGEM_REPO_PATH:-./external/HeyGem.ai}:/opt/heygem:ro
      - ${HEYGEM_DATA_PATH:-./external/duix_avatar_data}:/duix_avatar_data

  distributor:
    image: python:3.12-slim
    profiles: ["distribution"]
    command: ["sh", "-lc", "echo '请在这里安装并配置 dreammis/social-auto-upload sau CLI' && sleep infinity"]
    volumes:
      - ./storage:/app/storage

volumes:
  mysql-data:
